<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>footer</title>
    <style>
        footer {
            background-color: #68BDCE !important;
            color: white;
            margin-top: 120px;
            padding-top: 80px !important;
            padding-bottom: 30px !important;
            border-radius: 30px 30px 0 0;
        }
        footer h5 {
            color: white;
            font-weight: bold;
        }
        footer p {
            color: rgba(255,255,255,0.9);
        }
        footer a {
            color: white;
            text-decoration: none;
        }
        footer a:hover {
            color: #F28225;
            text-decoration: none;
        }
        .footer-previa {
            display: inline-block;
            padding: 8px 20px;
            background-color: #F28225;
            color: white !important;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .footer-previa:hover {
            background-color: #d97119;
            transform: scale(1.05);
        }
        footer img {
            transition: all 0.3s ease;
        }
        footer img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div th:fragment="footer">

    <footer class="text-center text-md-start">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-3 text-center">
                    <img src="img/logo.png" height="60" alt="Logo">
                </div>
                <div class="col-md-3">
                    <h5 class="fw-bold">Contacto</h5>
                    <p><i class="fas fa-map-marker-alt text-info me-2"></i> Lurigancho - Chosica</p>
                    <p><i class="fas fa-phone text-info me-2"></i> +51 929 385 047</p>
                </div>
                <div class="col-md-3">
                    <h5 class="fw-bold">Horarios</h5>
                    <p>Lunes a Domingo<br>9:00 am – 9:00 pm</p>
                </div>
                <div class="col-md-3 text-center">
                    <h5 class="fw-bold">Síguenos</h5>
                    <div class="d-flex justify-content-center gap-3 mt-3">
                        <a href="#"><img src="img/facebook.png" width="30"></a>
                        <a href="#"><img src="img/instagram.png" width="30"></a>
                        <a href="#"><img src="img/tiktok.png" width="30"></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
