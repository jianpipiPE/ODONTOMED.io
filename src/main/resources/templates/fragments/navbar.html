<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <title>navbar</title>
</head>
<body>
<div th:fragment="navbar">
<!-- 🔵 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <img src="/img/logo.png" alt="OdontoMed" height="50">
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="menu" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <!-- 🔗 ENLACES -->
                <li class="nav-item"><a href="/" class="nav-link text-dark fw-bold">Inicio</a></li>
                <li class="nav-item"><a href="/servicios" class="nav-link text-dark fw-bold">Servicios</a></li>
                <li class="nav-item"><a href="/nosotros" class="nav-link text-dark fw-bold">Nosotros</a></li>
                <li class="nav-item"><a href="/eventos" class="nav-link text-dark fw-bold">Eventos</a></li>

                <li class="nav-item ms-3">

                    <!-- 🔓 NO LOGUEADO -->
                    <div sec:authorize="!isAuthenticated()">
                        <a href="/login" class="btn btn-primary">Ingresar</a>
                    </div>

                    <!-- 🔐 LOGUEADO -->
                    <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">

                        <!-- BOTÓN PANEL/PERFIL -->
                        <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn btn-warning btn-sm me-2">
                            <i class="fas fa-cog"></i> Panel Admin
                        </a>
                        <a sec:authorize="hasRole('USER')" href="/perfil" class="btn btn-info btn-sm me-2">
                            <i class="fas fa-user"></i> Mi Perfil
                        </a>

                        <span class="text-dark fw-bold" th:text="${usuario.nombre}"></span>

                        <span sec:authorize="hasRole('ADMIN')" class="badge bg-warning ms-2">ADMIN</span>
                        <span sec:authorize="hasRole('USER')" class="badge bg-info ms-2">USER</span>

                        <a href="/logout" class="btn btn-danger btn-sm ms-3">Salir</a>

                    </div>
                </li>
            </ul>
        </div>
    </div>
</nav>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
