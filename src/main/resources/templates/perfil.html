<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil - OdontoMed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card {
            border-radius: 15px;
        }

        .profile-header {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- 👤 PERFIL -->
    <div class="card shadow">

        <div class="profile-header text-center">
            <h3><i class="fa fa-user-circle"></i> Mi Perfil</h3>
        </div>

        <div class="card-body text-center">

            <h4 class="mt-2" th:text="${usuario.nombre}"></h4>

            <p class="text-muted">
                <i class="fa fa-envelope"></i>
                <span th:text="${usuario.email}"></span>
            </p>

        </div>

    </div>

    <!-- 📁 DOCUMENTOS -->
    <div class="card shadow mt-4 p-4">

        <h5><i class="fa fa-file-medical"></i> Mis Ecografías</h5>

        <div class="table-responsive mt-3">
            <table class="table table-hover align-middle">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Acción</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="doc, iter : ${documentos}">
                    <td th:text="${iter.index + 1}"></td>

                    <td>
                        <i class="fa fa-file-image text-primary"></i>
                        <span th:text="${doc.nombre}"></span>
                    </td>

                    <td>
                        <a th:href="@{'/' + ${doc.ruta}}" target="_blank" class="btn btn-primary">
                            <i class="fa fa-eye"></i> Ver
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(documentos)}">
                    <td colspan="3" class="text-center text-muted">
                        No tienes ecografías registradas
                    </td>
                </tr>

                </tbody>
            </table>
        </div>

    </div>

    <!-- 🔙 BOTÓN -->
    <div class="text-center mt-4">
        <a href="/" class="btn btn-secondary">
            <i class="fa fa-arrow-left"></i> Volver al inicio
        </a>
    </div>

</div>

</body>
</html>
