<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - OdontoMed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #F28225, #68BDCE);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            border-left: 5px solid #F28225;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
        }

        .btn-primary {
            background-color: #F28225 !important;
            border-color: #F28225 !important;
        }

        .btn-primary:hover {
            background-color: #d97119 !important;
            border-color: #d97119 !important;
        }

        h3 {
            color: #F28225;
        }

        a {
            color: #F28225 !important;
        }
    </style>
</head>

<body>

<div class="card shadow-lg p-4 login-card">

    <div class="text-center mb-3">
        <h3 class="fw-bold">🦷 OdontoMed</h3>
        <p class="text-muted">Iniciar sesión</p>
    </div>

    <form method="post" action="/login">

        <!-- EMAIL -->
        <div class="mb-3">
            <label>Email</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="correo@gmail.com" required>
            </div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
            <label>Contraseña</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>
        </div>

        <!-- BOTON -->
        <div class="d-grid">
            <button class="btn btn-primary">
                <i class="fa fa-sign-in-alt"></i> Ingresar
            </button>
        </div>

    </form>
    <div th:if="${param.error}" class="alert alert-danger mt-3">
        Usuario o contraseña incorrectos
    </div>

    <div th:if="${param.logout}" class="alert alert-success mt-3">
        Sesión cerrada correctamente
    </div>
    <!-- LINK -->
    <div class="text-center mt-3">
        <a href="/" class="text-decoration-none">← Volver al inicio</a>
    </div>

</div>

</body>
</html>
